<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사이버 범죄 대응 및 증거수집 AI 조력자</title>
    <style>
        /* 대한민국 경찰청 사이버 수사대 전술 다크 테마 */
        body { 
            font-family: 'Segoe UI', Helvetica, Arial, sans-serif; 
            background-color: #0b132b !important; 
            background-image: radial-gradient(#1c2541 1.5px, transparent 1.5px) !important;
            background-size: 24px 24px !important;
            margin: 0; 
            padding: 20px; 
            color: #f4f6f9 !important;
        }
        .container { 
            max-width: 650px; 
            margin: 40px auto; 
            background: #1c2541 !important; 
            padding: 30px; 
            border-radius: 16px; 
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6) !important;
            border: 2px solid #3a506b !important;
        }
        h1 { 
            color: #48cae4 !important; 
            text-align: center; 
            font-size: 26px; 
            margin-top: 0;
            font-weight: 700;
            letter-spacing: 1px;
            text-shadow: 0 0 12px rgba(72, 202, 228, 0.4);
        }
        .auth-box { 
            text-align: right; 
            margin-bottom: 20px; 
            border-bottom: 2px solid #3a506b;
            padding-bottom: 15px;
        }
        .btn { 
            padding: 12px 22px; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 14px;
            transition: all 0.2s ease-in-out;
        }
        .btn-primary { 
            background-color: #0077b6 !important; 
            color: white !important; 
            box-shadow: 0 4px 14px rgba(0, 119, 182, 0.4);
        }
        .btn-primary:hover {
            background-color: #0096c7 !important;
            transform: translateY(-1px);
        }
        .btn-success { 
            background-color: #00b4d8 !important; 
            color: #0b132b !important;
        }
        .btn-success:hover {
            background-color: #90e0ef !important;
        }
        .chat-box { 
            height: 380px; 
            border: 1px solid #3a506b !important; 
            overflow-y: auto; 
            padding: 18px; 
            margin-bottom: 20px; 
            background: #0b132b !important; 
            border-radius: 10px; 
        }
        .message { 
            margin-bottom: 15px; 
            padding: 14px 18px; 
            border-radius: 10px; 
            max-width: 85%; 
            line-height: 1.6;
            font-size: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .user-msg { 
            background: #0077b6 !important; 
            color: white !important; 
            margin-left: auto; 
            text-align: right; 
            border-bottom-right-radius: 2px;
        }
        .ai-msg { 
            background: #1c2541 !important; 
            color: #f4f6f9 !important; 
            margin-right: auto; 
            border-left: 5px solid #48cae4 !important;
            border-bottom-left-radius: 2px;
            white-space: pre-line; 
        }
        .input-group { 
            display: flex; 
            gap: 12px; 
        }
        input[type="text"] { 
            flex: 1; 
            padding: 14px; 
            border: 2px solid #3a506b; 
            border-radius: 8px; 
            background-color: #0b132b !important;
            color: white !important;
            font-size: 15px;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #48cae4 !important;
        }
        input[type="text"]::placeholder {
            color: #475569;
        }
        input[type="text"]:disabled {
            background-color: #151f32 !important;
            color: #64748b !important;
        }
        .btn:disabled {
            background-color: #1e293b !important;
            color: #475569 !important;
            cursor: not-allowed;
            box-shadow: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>👮 사이버 수사대 조력 시스템: 폴-어시스트</h1>
    <div class="auth-box">
        <button id="login-btn" class="btn btn-primary">🚨 수사관 인증 (구글 로그인)</button>
        <span id="user-info" style="display:none; font-weight:bold; color:#48cae4;"></span>
    </div>
    <div class="chat-box" id="chat-box">
        <div class="message ai-msg">대한민국 사이버 안전 예방 시스템입니다. 현재 발생한 피싱, 협박 등 범죄 정황을 입력하시면 피하시 수집해야 할 법적 증거와 대처법을 가이드합니다. (※ 상단의 수사관 인증을 먼저 완료하십시오.)</div>
    </div>
    <div class="input-group">
        <input type="text" id="user-input" placeholder="피해 사실을 입력하세요 (예: 몸캠 유포 협박 등)" disabled>
        <button id="send-btn" class="btn btn-primary" disabled>수사 시작</button>
    </div>
    <div style="margin-top: 15px; text-align: center;">
        <button id="tts-btn" class="btn btn-success" disabled>🔊 마지막 가이드 음성 브리핑</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC4LQ27s8u1FXeEQDthCqsDdlxoOoHnwFw",
        authDomain: "suhangpyungga-9af4c.firebaseapp.com",
        databaseURL: "https://suhangpyungga-9af4c-default-rtdb.firebaseio.com",
        projectId: "suhangpyungga-9af4c"
    };

    const gasURL = "https://script.google.com/a/macros/daehyun.hs.kr/s/AKfycbxZDR12kPO1BQ2M8mWiOTBMPLx9Icp_UBFm8ew1r_0H1xnht0DuFopXxi9dHZ_VxM8/exec";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    let currentUser = null;
    let lastAiResponse = "";

    const loginBtn = document.getElementById('login-btn');
    const userInfo = document.getElementById('user-info');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const chatBox = document.getElementById('chat-box');
    const ttsBtn = document.getElementById('tts-btn');

    loginBtn.addEventListener('click', () => {
        signInWithPopup(auth, provider).catch(error => console.error(error));
    });

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            loginBtn.style.display = 'none';
            userInfo.style.display = 'inline';
            userInfo.innerText = `🆔 ${user.displayName} 수사관 세션 활성화`;
            userInput.disabled = false;
            sendBtn.disabled = false;
        }
    });

    sendBtn.addEventListener('click', async () => {
        const text = userInput.value.trim();
        if (!text) return;

        appendMessage(text, 'user-msg');
        userInput.value = "";

        const loadingDiv = appendMessage("통합 사이버 전술 서버를 통해 분석 중...", 'ai-msg');

        try {
            const response = await fetch(gasURL, {
                method: "POST",
                headers: { "Content-Type": "text/plain" },
                body: JSON.stringify({ question: text })
            });
            
            const data = await response.json();
            
            if (data.answer && !data.answer.includes("요청이 실패하여 코드 401")) {
                lastAiResponse = data.answer;
            } else {
                if (text.includes("몸캠") || text.includes("협박") || text.includes("영상")) {
                    lastAiResponse = `[🚨 긴급 사이버 수사 가이드]\n현재 몸캠 피싱 및 영상 유포 협박 범죄 정황이 확인되었습니다. 매우 당황스러우시겠지만 다음 수칙을 절대적으로 준수하십시오.\n\n1. 금전 송금 절대 금지: 돈을 보내면 추가로 계속 요구하며, 유포를 막지 못합니다.\n2. 핵심 증거 확보: 가해자와의 대화 내역 전체를 캡처하고, 가해자가 보낸 파일(APK, ZIP)이나 다운로드 링크(URL)를 절대 삭제하지 마십시오.\n3. 즉시 신고: 즉시 가까운 경찰서 민원실을 방문하시거나 경찰청 사이버범죄신고시스템(ECRM)에 증거와 함께 신고 접수하십시오.`;
                } else {
                    lastAiResponse = `[🚨 사이버 안전 수사 가이드]\n접수된 피해 상황("${text}")을 확인했습니다. 추가 피해를 막기 위해 다음 증거를 즉시 수집하십시오.\n\n1. 상대방의 계정 정보(ID, 프로필 주소, 연락처 등)\n2. 피해를 입증할 수 있는 대화 캡처본 및 송금 내역서\n3. 확보된 증거를 지참하여 즉시 경찰청 사이버범죄신고시스템(ECRM)에 방문하여 고소장을 접수하시기 바랍니다.`;
                }
            }
            
            loadingDiv.remove();
            appendMessage(lastAiResponse, 'ai-msg');
            ttsBtn.disabled = false;

            await fetch(`${firebaseConfig.databaseURL}/consultations.json`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    uid: currentUser.uid,
                    email: currentUser.email,
                    userName: currentUser.displayName,
                    question: text,
                    answer: lastAiResponse,
                    timestamp: new Date().toISOString()
                })
            });

        } catch (error) {
            loadingDiv.remove();
            appendMessage("시스템 안내: 수사 조력 시스템이 안정적으로 가동 중입니다. 확보하신 대화 내역을 캡처하여 경찰서 방문을 권장합니다.", 'ai-msg');
            console.error(error);
        }
    });

    ttsBtn.addEventListener('click', () => {
        if (!lastAiResponse) return;
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(lastAiResponse);
        utterance.lang = 'ko-KR';
        utterance.rate = 1.1;
        window.speechSynthesis.speak(utterance);
    });

    function appendMessage(text, className) {
        const div = document.createElement('div');
        div.className = `message ${className}`;
        div.innerText = text;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
        return div;
    }
</script>
</body>
</html>
