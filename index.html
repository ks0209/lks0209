<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사이버 범죄 대응 및 증거수집 AI 조력자</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #1a365d; text-align: center; font-size: 24px; }
        .auth-box { text-align: right; margin-bottom: 20px; }
        .btn { padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-primary { background-color: #1a365d; color: white; }
        .btn-success { background-color: #2f855a; color: white; }
        .chat-box { height: 300px; border: 1px solid #e2e8f0; overflow-y: scroll; padding: 10px; margin-bottom: 15px; background: #edf2f7; border-radius: 5px; }
        .message { margin-bottom: 10px; padding: 8px 12px; border-radius: 5px; max-width: 80%; }
        .user-msg { background: #1a365d; color: white; margin-left: auto; text-align: right; }
        .ai-msg { background: white; color: #2d3748; margin-right: auto; white-space: pre-line; }
        .input-group { display: flex; gap: 10px; }
        input[type="text"] { flex: 1; padding: 10px; border: 1px solid #cbd5e0; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🚨 폴-어시스트 (사이버 범죄 AI 조력자)</h1>
    <div class="auth-box">
        <button id="login-btn" class="btn btn-primary">구글 로그인</button>
        <span id="user-info" style="display:none; font-weight:bold; color:#1a365d;"></span>
    </div>
    <div class="chat-box" id="chat-box">
        <div class="message ai-msg">안녕하세요. 사이버 안전 예방 및 증거수집 도우미 AI 경찰관입니다. 현재 겪고 계신 피해 상황을 말씀해 주시면 대처법과 증거 수집 가이드를 안내해 드리겠습니다. (※ 로그인을 먼저 해주세요!)</div>
    </div>
    <div class="input-group">
        <input type="text" id="user-input" placeholder="예: '모르는 사람이 몸캠 영상을 유포하겠다고 협박해요.'" disabled>
        <button id="send-btn" class="btn btn-primary" disabled>상담하기</button>
    </div>
    <div style="margin-top: 15px; text-align: center;">
        <button id="tts-btn" class="btn btn-success" disabled>🔊 마지막 답변 음성으로 듣기</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC4LQ27s8u1FXeEQDthCqsDdlxoOoHnwFw",
        authDomain: "suhangpyungga-9af4c.firebaseapp.com",
        databaseURL: "https://suhangpyungga-9af4c-default-rtdb.firebaseio.com",
        projectId: "suhangpyungga-9af4c"
    };

    // 쌤이 발급해주신 학교 도메인 웹 앱 주소를 정확하게 연결했습니다.
    const gasURL = "https://script.google.com/a/macros/daehyun.hs.kr/s/AKfycbxZDR12kPO1BQ2M8mWiOTBMPLx9Icp_UBFm8ew1r_0H1xnht0DuFopXxi9dHZ_VxM8/exec";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    let currentUser = null;
    let lastAiResponse = "";

    const loginBtn = document.getElementById('login-btn');
    const userInfo = document.getElementById('user-info');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const chatBox = document.getElementById('chat-box');
    const ttsBtn = document.getElementById('tts-btn');

    loginBtn.addEventListener('click', () => {
        signInWithPopup(auth, provider).catch(error => console.error("로그인 실패:", error));
    });

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            loginBtn.style.display = 'none';
            userInfo.style.display = 'inline';
            userInfo.innerText = `${user.displayName} 수사관님 환영합니다.`;
            userInput.disabled = false;
            sendBtn.disabled = false;
        }
    });

    sendBtn.addEventListener('click', async () => {
        const text = userInput.value.trim();
        if (!text) return;

        appendMessage(text, 'user-msg');
        userInput.value = "";

        const loadingDiv = appendMessage("선생님의 Apps Script 서버를 거쳐 OpenAI 분석 중입니다...", 'ai-msg');

        try {
            // 1. 구글 Apps Script 연동 서버(OpenAI GPT)에 질문 전달 및 답변 대기
            const response = await fetch(gasURL, {
                method: "POST",
                headers: { "Content-Type": "text/plain" }, // Apps Script CORS 에러 방지용 세팅
                body: JSON.stringify({ question: `너는 사이버 범죄 전문 수사관이다. 다음 피해 상황에 대해 공감해주고, 피해자가 수집해야 할 법적 증거(캡처, URL 등)와 대처법을 친절하게 안내해줘. 질문: ${text}` })
            });
            
            const data = await response.json();
            
            if (data.answer) {
                lastAiResponse = data.answer;
            } else if (data.error) {
                lastAiResponse = "서버 오류가 발생했습니다: " + data.error;
            } else {
                lastAiResponse = "답변을 추출하는 데 실패했습니다.";
            }
            
            loadingDiv.remove();
            appendMessage(lastAiResponse, 'ai-msg');
            ttsBtn.disabled = false;

            // 2. 파이어베이스 실시간 데이터베이스(Realtime DB)에 상담 데이터 영구 기록
            await fetch(`${firebaseConfig.databaseURL}/consultations.json`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    uid: currentUser.uid,
                    email: currentUser.email,
                    userName: currentUser.displayName,
                    question: text,
                    answer: lastAiResponse,
                    timestamp: new Date().toISOString()
                })
            });

        } catch (error) {
            loadingDiv.innerText = "상담 내용을 불러오는 중 오류가 발생했습니다. Apps Script 배포 설정 및 API 키를 확인해주세요.";
            console.error(error);
        }
    });

    ttsBtn.addEventListener('click', () => {
        if (!lastAiResponse) return;
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(lastAiResponse);
        utterance.lang = 'ko-KR';
        utterance.rate = 1.1;
        window.speechSynthesis.speak(utterance);
    });

    function appendMessage(text, className) {
        const div = document.createElement('div');
        div.className = `message ${className}`;
        div.innerText = text;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
        return div;
    }
</script>
</body>
</html>
